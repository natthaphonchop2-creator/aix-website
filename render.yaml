services:
  - type: web
    name: aix-website
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SESSION_TTL_MS
        value: "604800000"
      - key: MEMBER_PRICE
        value: "1999"
      - key: STRIPE_PAYMENT_METHOD_TYPES
        value: card,promptpay
      - key: ALLOW_DEV_PAYMENT_CONFIRM
        value: "false"
      - key: SMS_OTP_TTL_MS
        value: "300000"
      - key: SMS_OTP_RESEND_MS
        value: "60000"
      - key: SMS_OTP_MAX_ATTEMPTS
        value: "5"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: SMS_OTP_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_API_VERSION
        sync: false
      - key: THAIBULKSMS_API_KEY
        sync: false
      - key: THAIBULKSMS_API_SECRET
        sync: false
      - key: THAIBULKSMS_SENDER
        value: Demo
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
